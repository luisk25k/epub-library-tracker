<svg xmlns="http://www.w3.org/2000/svg" width="180" height="270" viewBox="0 0 180 270">
  <!-- Background -->
  <rect width="180" height="270" rx="8" fill="#334155"/>
  <!-- Border -->
  <rect x="1" y="1" width="178" height="268" rx="7" fill="none" stroke="#475569" stroke-width="1"/>
  <!-- Book spine line -->
  <line x1="12" y1="20" x2="12" y2="250" stroke="#475569" stroke-width="2"/>
  <!-- Book icon -->
  <g transform="translate(90, 110)">
    <rect x="-24" y="-30" width="48" height="60" rx="4" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="-16" y1="-18" x2="16" y2="-18" stroke="#64748b" stroke-width="1.2"/>
    <line x1="-16" y1="-10" x2="16" y2="-10" stroke="#64748b" stroke-width="1.2"/>
    <line x1="-16" y1="-2" x2="8" y2="-2" stroke="#64748b" stroke-width="1.2"/>
  </g>
  <!-- Text -->
  <text x="90" y="175" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="11" font-weight="500">Sin portada</text>
</svg>
