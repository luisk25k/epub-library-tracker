<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal Library Tracker — Gestor privado de biblioteca personal para libros digitales y físicos.">
    
    <!-- CSRF Token para peticiones Fetch JS -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <title>{% block title %}📚 Library Tracker{% endblock %}</title>
    
    <!-- Favicon SVG -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- DOMPurify para sanitización XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js" integrity="sha512-TBmnYz6mBCb3MpKT5Z4FxtfluqqQO/F6+8xFTYqD5VD6O37Q6GzW1G8j2S9v3Y/s/aK1b66hI5+Z/bJ1lB+P+w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        // Configuración de TailwindCSS para tema oscuro personalizado
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#1e293b',
                        'surface-hover': '#334155',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-900 text-slate-50 font-sans">

    <!-- ================================================================== -->
    <!-- NAVBAR                                                             -->
    <!-- ================================================================== -->
    <nav class="sticky top-0 z-40 bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo / Nombre -->
                <a href="/" class="flex items-center gap-3 group">
                    <span class="text-2xl">📚</span>
                    <span class="text-lg font-semibold text-slate-100 group-hover:text-amber-400 transition-colors duration-200">
                        Library Tracker
                    </span>
                </a>

                <!-- Navegación derecha -->
                <div class="flex items-center gap-4">
                    <a href="/"
                       class="text-sm text-slate-400 hover:text-slate-100 transition-colors duration-200 px-3 py-2 rounded-lg hover:bg-slate-700/50"
                       id="nav-home">
                        Estantería
                    </a>
                    <button id="btn-import-csv"
                       class="inline-flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium text-sm px-4 py-2 rounded-lg transition-all duration-200 hover:shadow-lg hover:shadow-slate-500/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        Importar CSV
                    </button>
                    <!-- Input oculto para CSV -->
                    <input type="file" id="csv-file-input" accept=".csv" class="hidden">
                    
                    <a href="/books/new"
                       class="inline-flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-medium text-sm px-4 py-2 rounded-lg transition-all duration-200 hover:shadow-lg hover:shadow-amber-500/20"
                       id="nav-add-book">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Añadir libro
                    </a>
                    
                    <!-- Botón Cerrar (útil para exe) -->
                    <button id="btn-shutdown"
                       class="inline-flex items-center gap-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-medium text-sm px-3 py-2 rounded-lg transition-all duration-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ================================================================== -->
    <!-- CONTENIDO PRINCIPAL                                                -->
    <!-- ================================================================== -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- ================================================================== -->
    <!-- FOOTER                                                             -->
    <!-- ================================================================== -->
    <footer class="border-t border-slate-800 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-xs text-slate-600">
                Personal Library Tracker — Sistema privado de catalogación · v1.0
            </p>
        </div>
    </footer>

    <!-- ================================================================== -->
    <!-- TOAST CONTAINER (Notificaciones)                                   -->
    <!-- ================================================================== -->
    <div id="toast-container"></div>

    <!-- ================================================================== -->
    <!-- SCRIPTS                                                            -->
    <!-- ================================================================== -->
    <!-- marked.js para renderizado de Markdown en el cliente -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.2.12/marked.min.js" integrity="sha384-wM2yU+7/VqG324Xj8b3l5QxLOMw+k9sY8p+8RtjW2o6UvjO/+i0c4N9C9DpxF0g/" crossorigin="anonymous"></script>

    <!-- JavaScript principal de la aplicación -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts_extra %}{% endblock %}
</body>
</html>
